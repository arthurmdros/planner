<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Planner Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .password-toggle:hover {
            background: #f1f5f9;
            color: #374151;
        }
        
        .password-input {
            width: 100%;
            padding: 12px 16px;
            padding-right: 40px !important;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e5e7eb;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        
        .strength-weak { background: #dc2626; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #16a34a; width: 100%; }
        
        .token-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #64748b;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">📚</div>
        <h1>Redefinir Senha</h1>
        <p class="subtitle">Crie uma nova senha para sua conta</p>
        
        <div class="token-info" id="tokenInfo" style="display: none;">
            Token: <span id="tokenDisplay"></span>
        </div>
        
        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processando...</p>
        </div>
        
        <!-- Reset Password Form -->
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">Nova senha (mínimo 6 caracteres)</label>
                <div class="password-input-wrapper">
                    <input type="password" id="newPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">👁️</button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar nova senha</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Redefinir Senha</button>
            <button type="button" class="btn btn-secondary" onclick="goToLogin()">Voltar para Login</button>
        </form>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        // Elementos
        const resetForm = document.getElementById('resetForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const passwordStrength = document.getElementById('passwordStrength');
        const tokenInfo = document.getElementById('tokenInfo');
        const tokenDisplay = document.getElementById('tokenDisplay');
        
        // Obter token da URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        
        // Função para mostrar/esconder senha
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            button.textContent = type === 'password' ? '👁️' : '🙈';
        }
        
        // Verificar força da senha
        document.getElementById('newPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            passwordStrength.className = 'password-strength';
            
            if (password.length > 0) {
                if (strength <= 2) {
                    passwordStrength.classList.add('strength-weak');
                } else if (strength <= 3) {
                    passwordStrength.classList.add('strength-medium');
                } else {
                    passwordStrength.classList.add('strength-strong');
                }
            }
        });
        
        // Funções auxiliares
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }
        
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }
        
        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }
        
        function showLoading() {
            loading.style.display = 'block';
            resetForm.style.display = 'none';
        }
        
        function hideLoading() {
            loading.style.display = 'none';
            resetForm.style.display = 'block';
        }
        
        function goToLogin() {
            window.location.href = '/auth.html';
        }
        
        // Verificar token ao carregar a página
        window.addEventListener('load', () => {
            if (!resetToken) {
                showError('Token de redefinição não fornecido. Solicite um novo link de recuperação.');
                resetForm.style.display = 'none';
            } else {
                // Em desenvolvimento, mostrar o token
                if (window.location.hostname === 'localhost' || window.location.hostname.includes('vercel.app')) {
                    tokenDisplay.textContent = resetToken;
                    tokenInfo.style.display = 'block';
                }
            }
        });
        
        // Reset de senha
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!resetToken) {
                showError('Token de redefinição inválido');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showError('As senhas não coincidem');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Senha redefinida com sucesso! Redirecionando para o login...');
                    
                    setTimeout(() => {
                        window.location.href = '/auth.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Erro ao redefinir senha');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
