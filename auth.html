<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Premium - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #374151;
            border: 2px solid #e5e7eb;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }
        
        .btn-secondary:active {
            transform: translateY(0);
        }
        
        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .toggle-form {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        
        .toggle-form:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
        
        .strength-weak { background: #dc2626; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #16a34a; width: 100%; }
        
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .password-toggle:hover {
            background: #f1f5f9;
            color: #374151;
        }
        
        .password-input {
            width: 100%;
            padding-right: 40px !important;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: 10px;
        }
        
        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">📚</div>
        <h1>Planner Premium</h1>
        <p class="subtitle">Sua organização para concursos públicos</p>
        
        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processando...</p>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="seu@email.com">
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <div class="password-input-wrapper">
                    <input type="password" id="loginPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
                </div>
            </div>
            
            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="registerName">Nome completo</label>
                <input type="text" id="registerName" required placeholder="Seu nome">
            </div>
            
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required placeholder="seu@email.com">
            </div>
            
            <div class="form-group">
                <label for="registerPassword">Senha (mínimo 6 caracteres)</label>
                <div class="password-input-wrapper">
                    <input type="password" id="registerPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)">👁️</button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar senha</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁️</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="accessKey">Chave de acesso (opcional)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="accessKey" placeholder="Digite ou gere uma chave" maxlength="8" style="text-transform: uppercase; flex: 1;">
                    <button type="button" class="btn-secondary" onclick="generateAccessKey()" style="padding: 12px 20px; white-space: nowrap;">🔑 Gerar SHA-256</button>
                </div>
                <small style="color: #64748b; font-size: 12px; margin-top: 5px; display: block;">
                    A chave de acesso é usada para recuperação de senha. Guarde-a em local seguro.
                </small>
            </div>
            
            <button type="submit" class="btn btn-primary">Criar conta</button>
        </form>
        
        <!-- Forgot Password Form -->
        <form id="forgotForm" style="display: none;">
            <div class="form-group">
                <label for="forgotEmail">Email cadastrado</label>
                <input type="email" id="forgotEmail" required placeholder="seu@email.com">
            </div>
            
            <div class="form-group">
                <label for="forgotAccessKey">Chave de acesso</label>
                <input type="text" id="forgotAccessKey" required placeholder="Sua chave de 8 caracteres" maxlength="8" style="text-transform: uppercase;">
            </div>
            
            <button type="submit" class="btn btn-primary">Validar dados</button>
            <button type="button" class="btn btn-secondary" onclick="backToLogin()">Voltar para login</button>
        </form>
        
        <!-- Reset Password Form -->
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label>Nova senha (mínimo 6 caracteres)</label>
                <div class="password-input-wrapper">
                    <input type="password" id="newPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">👁️</button>
                </div>
                <div class="password-strength" id="newPasswordStrength"></div>
            </div>
            
            <div class="form-group">
                <label>Confirmar nova senha</label>
                <div class="password-input-wrapper">
                    <input type="password" id="confirmNewPassword" class="password-input" required placeholder="••••••••">
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmNewPassword', this)">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Redefinir senha</button>
            <button type="button" class="btn btn-secondary" onclick="backToLogin()">Voltar para login</button>
        </form>
        
        <p style="margin-top: 20px; color: #64748b;">
            <span id="toggleText">Não tem uma conta?</span>
            <a href="#" class="toggle-form" id="toggleForm">Cadastre-se</a>
        </p>
    </div>

    <script src="indexeddb-storage.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';
        
        // Elementos
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const forgotForm = document.getElementById('forgotForm');
        const resetForm = document.getElementById('resetForm');
        const toggleForm = document.getElementById('toggleForm');
        const toggleText = document.getElementById('toggleText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const passwordStrength = document.getElementById('passwordStrength');
        const newPasswordStrength = document.getElementById('newPasswordStrength');
        
        // Função para mostrar/esconder senha
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            button.textContent = type === 'password' ? '👁️' : '🙈';
        }
        
        // Função para esconder todos os formulários
        function hideAllForms() {
            loginForm.style.display = 'none';
            registerForm.style.display = 'none';
            forgotForm.style.display = 'none';
            resetForm.style.display = 'none';
        }
        
        // Função para mostrar formulário de esqueceu senha
        function showForgotPassword() {
            hideAllForms();
            forgotForm.style.display = 'block';
            hideMessages();
        }
        
        // Função para mostrar formulário de reset de senha
        function showResetPasswordForm(email, accessKey) {
            hideAllForms();
            resetForm.style.display = 'block';
            
            // Salvar dados validados para usar depois
            resetForm.dataset.email = email;
            resetForm.dataset.accessKey = accessKey;
            
            hideMessages();
        }
        
        // Função para voltar ao login
        function backToLogin() {
            hideAllForms();
            loginForm.style.display = 'block';
            hideMessages();
        }
        
        // Toggle entre login e registro
        toggleForm.addEventListener('click', (e) => {
            e.preventDefault();
            
            if (loginForm.style.display !== 'none') {
                hideAllForms();
                registerForm.style.display = 'block';
                toggleText.textContent = 'Já tem uma conta?';
                toggleForm.textContent = 'Entre';
            } else {
                hideAllForms();
                loginForm.style.display = 'block';
                toggleText.textContent = 'Não tem uma conta?';
                toggleForm.textContent = 'Cadastre-se';
            }
            
            hideMessages();
        });
        
        // Verificar força da senha
        document.getElementById('registerPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            updatePasswordStrength(password, passwordStrength);
        });
        
        // Verificar força da nova senha
        document.getElementById('newPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            updatePasswordStrength(password, newPasswordStrength);
        });
        
        // Função para atualizar indicador de força da senha
        function updatePasswordStrength(password, strengthElement) {
            let strength = 0;
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthElement.className = 'password-strength';
            
            if (password.length > 0) {
                if (strength <= 2) {
                    strengthElement.classList.add('strength-weak');
                } else if (strength <= 3) {
                    strengthElement.classList.add('strength-medium');
                } else {
                    strengthElement.classList.add('strength-strong');
                }
            }
        }
        
        // Função para gerar chave de acesso SHA-256
        async function generateAccessKey() {
            try {
                // Gerar string aleatória baseada em timestamp e valores aleatórios
                const randomString = Date.now().toString() + Math.random().toString(36) + 'planner_access_key';
                
                // Gerar hash SHA-256
                const encoder = new TextEncoder();
                const data = encoder.encode(randomString);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                
                // Pegar os primeiros 8 caracteres e converter para maiúsculas
                const accessKey = hashHex.substring(0, 8).toUpperCase();
                
                // Preencher o campo
                document.getElementById('accessKey').value = accessKey;
                
                showSuccess('Chave de acesso gerada: ' + accessKey);
            } catch (error) {
                console.error('Erro ao gerar chave de acesso:', error);
                showError('Erro ao gerar chave de acesso. Tente novamente.');
            }
        }
        
        // Validação de e-mail
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // Validação de senha
        function validatePassword(password) {
            return password.length >= 6;
        }
        
        // Login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!validateEmail(email)) {
                showError('Por favor, informe um email válido');
                return;
            }
            
            if (!validatePassword(password)) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Salvar no IndexedDB usando o mesmo sistema do planner
                    const authStorage = new IndexedDBStorage('PlannerAuthDB', 1);
                    await authStorage.init();
                    
                    authStorage.set('authToken', data.token);
                    authStorage.set('currentUser', data.user);
                    
                    // Salvar chave de acesso se disponível
                    if (data.accessKey) {
                        authStorage.set('accessKey', data.accessKey);
                        localStorage.setItem('plannerAccessKey', data.accessKey);
                    }
                    
                    // Backup no localStorage por segurança
                    localStorage.setItem('plannerToken', data.token);
                    localStorage.setItem('plannerUser', JSON.stringify(data.user));
                    
                    showSuccess('Login realizado com sucesso! Redirecionando...');
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    showError(data.error || 'Erro ao fazer login');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                hideLoading();
            }
        });
        
        // Registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const accessKey = document.getElementById('accessKey').value.toUpperCase();
            
            if (!name || name.trim().length < 3) {
                showError('O nome deve ter pelo menos 3 caracteres');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Por favor, informe um email válido');
                return;
            }
            
            if (!validatePassword(password)) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('As senhas não coincidem');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password, accessKey })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Salvar no IndexedDB usando o mesmo sistema do planner
                    const authStorage = new IndexedDBStorage('PlannerAuthDB', 1);
                    await authStorage.init();
                    
                    authStorage.set('authToken', data.token);
                    authStorage.set('currentUser', data.user);
                    
                    // Salvar chave de acesso se disponível
                    if (data.accessKey) {
                        authStorage.set('accessKey', data.accessKey);
                        localStorage.setItem('plannerAccessKey', data.accessKey);
                        showSuccess(`Conta criada com sucesso! Sua chave de acesso: ${data.accessKey}. Redirecionando...`);
                    } else {
                        showSuccess('Conta criada com sucesso! Redirecionando...');
                    }
                    
                    // Backup no localStorage por segurança
                    localStorage.setItem('plannerToken', data.token);
                    localStorage.setItem('plannerUser', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Erro ao criar conta');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                hideLoading();
            }
        });
        
        // Esqueceu senha
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('forgotEmail').value;
            const accessKey = document.getElementById('forgotAccessKey').value.toUpperCase();
            
            if (!email) {
                showError('Por favor, informe seu email');
                return;
            }
            
            if (!validateEmail(email)) {
                showError('Por favor, informe um email válido');
                return;
            }
            
            if (!accessKey || accessKey.length !== 8) {
                showError('A chave de acesso deve ter 8 caracteres');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, accessKey, newPassword: '' })
                });
                
                const data = await response.json();
                
                if (response.status === 400 && data.error === 'Email, chave de acesso e nova senha são obrigatórios') {
                    // Primeira validação passou, mostrar formulário de nova senha
                    hideLoading();
                    showResetPasswordForm(email, accessKey);
                } else if (response.ok) {
                    showSuccess('Senha redefinida com sucesso!');
                    setTimeout(() => {
                        backToLogin();
                    }, 2000);
                } else {
                    showError(data.error || 'Erro ao redefinir senha');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                hideLoading();
            }
        });
        
        // Reset de senha
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            const email = resetForm.dataset.email;
            const accessKey = resetForm.dataset.accessKey;
            
            if (!validatePassword(newPassword)) {
                showError('A senha deve ter pelo menos 6 caracteres');
                return;
            }
            
            if (newPassword !== confirmNewPassword) {
                showError('As senhas não coincidem');
                return;
            }
            
            showLoading();
            hideMessages();
            
            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, accessKey, newPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Senha redefinida com sucesso! Redirecionando...');
                    setTimeout(() => {
                        backToLogin();
                    }, 2000);
                } else {
                    showError(data.error || 'Erro ao redefinir senha');
                }
            } catch (error) {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                hideLoading();
            }
        });
        
        // Funções auxiliares
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }
        
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }
        
        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }
        
        function showLoading() {
            loading.style.display = 'block';
            hideAllForms();
        }
        
        function hideLoading() {
            loading.style.display = 'none';
            // Por padrão, volta ao login quando esconde o loading
            hideAllForms();
            loginForm.style.display = 'block';
        }
        
        // Verificar se já está logado
        window.addEventListener('load', async () => {
            // Tentar carregar do IndexedDB primeiro
            const authStorage = new IndexedDBStorage('PlannerAuthDB', 1);
            await authStorage.init();
            
            const token = authStorage.get('authToken');
            const user = authStorage.get('currentUser');
            
            if (token && user) {
                // Token existe no IndexedDB, redirecionar para o planner
                window.location.href = '/index.html';
            } else {
                // Fallback para localStorage
                const localStorageToken = localStorage.getItem('plannerToken');
                if (localStorageToken) {
                    // Migrar dados do localStorage para IndexedDB
                    const localStorageUser = localStorage.getItem('plannerUser');
                    const accessKey = localStorage.getItem('plannerAccessKey');
                    
                    if (localStorageUser) {
                        authStorage.set('authToken', localStorageToken);
                        authStorage.set('currentUser', JSON.parse(localStorageUser));
                        if (accessKey) {
                            authStorage.set('accessKey', accessKey);
                        }
                        window.location.href = '/index.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
